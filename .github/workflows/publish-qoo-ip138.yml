name: Publish qoo-ip138 to PyPI

on:
  push:
    branches:
      - main
    paths:
      - 'qoo_ip138/**'
      - 'pyproject.toml'
      - 'MANIFEST.in'
      - 'README.md'
      - '.github/workflows/publish-qoo-ip138.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository (no checkout action)
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" repo
          cd repo
          git checkout "${{ github.sha }}"

      - name: Show Python version
        run: python3 --version

      - name: Install dependencies
        working-directory: repo
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install build twine

      - name: Build package
        working-directory: repo
        run: |
          python3 -m build

      - name: Check package
        working-directory: repo
        run: |
          python3 -m twine check dist/*

      - name: Publish to PyPI
        working-directory: repo
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN_QOO_IP138 }}
        run: |
          python3 -m twine upload --verbose --skip-existing dist/*
